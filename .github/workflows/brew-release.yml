name: Update Homebrew Formula

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-formula:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Extract version from tag
        id: version
        env:
          TAG: ${{ github.event.workflow_run.head_branch }}
        run: |
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Wait for npm propagation
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @openforge-ai/cli@${VERSION} to appear on npm..."
          for i in $(seq 1 30); do
            if npm view "@openforge-ai/cli@${VERSION}" version 2>/dev/null; then
              echo "Package found on npm."
              exit 0
            fi
            echo "Attempt ${i}/30 — not yet available, waiting 10s..."
            sleep 10
          done
          echo "Package not found on npm after 5 minutes."
          exit 1

      - name: Get tarball SHA256
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://registry.npmjs.org/@openforge-ai/cli/-/cli-${VERSION}.tgz"
          SHA256=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Generate formula file
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          cat > /tmp/forgeai.rb << 'ENDOFFORMULA'
          class Forgeai < Formula
            desc "Agent infrastructure as code — the Terraform for AI agents"
            homepage "https://github.com/seanfraserio/forge"
            url "URL_PLACEHOLDER"
            sha256 "SHA256_PLACEHOLDER"
            license "MIT"

            depends_on "node"

            def install
              system "npm", "install", *std_npm_args
              bin.install_symlink libexec.glob("bin/*")
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/forge --version")
            end
          end
          ENDOFFORMULA

          sed -i "s|URL_PLACEHOLDER|${URL}|g" /tmp/forgeai.rb
          sed -i "s|SHA256_PLACEHOLDER|${SHA256}|g" /tmp/forgeai.rb

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CONTENT=$(base64 -w 0 < /tmp/forgeai.rb)

          EXISTING_SHA=$(curl -s \
            -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/seanfraserio/homebrew-tap/contents/Formula/forgeai.rb" \
            | jq -r '.sha // empty')

          if [ -n "$EXISTING_SHA" ]; then
            curl -sf -X PUT \
              -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/seanfraserio/homebrew-tap/contents/Formula/forgeai.rb" \
              -d "{\"message\":\"forgeai ${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${EXISTING_SHA}\"}"
          else
            curl -sf -X PUT \
              -H "Authorization: token ${HOMEBREW_TAP_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/seanfraserio/homebrew-tap/contents/Formula/forgeai.rb" \
              -d "{\"message\":\"forgeai ${VERSION}\",\"content\":\"${CONTENT}\"}"
          fi

          echo "Formula updated for version ${VERSION}"
