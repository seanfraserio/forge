name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high
      - run: pnpm build
      - run: pnpm test

      # Configure npm for OIDC trusted publishing (no token needed)
      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      # Publish each package in dependency order
      - name: Publish SDK
        run: cd packages/sdk && npm publish --access public --provenance
      - name: Publish Adapters
        run: cd packages/adapters && npm publish --access public --provenance
      - name: Publish CLI
        run: cd packages/cli && npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
