version: "1"

agent:
  name: support-triage
  description: "Classifies and routes incoming support tickets"

model:
  provider: anthropic
  name: claude-sonnet-4-5-20251001
  temperature: 0.3
  max_tokens: 2048

system_prompt:
  file: ./prompts/system.md

tools:
  mcp_servers:
    - name: filesystem
      command: npx
      args: ["-y", "@modelcontextprotocol/server-filesystem", "./data"]
    - name: brave-search
      command: npx
      args: ["-y", "@modelcontextprotocol/server-brave-search"]
      env:
        BRAVE_API_KEY: "${BRAVE_API_KEY}"

memory:
  type: none

environments:
  dev:
    model:
      name: claude-haiku-4-5-20251001
  staging: {}
  production:
    model:
      temperature: 0.1

hooks:
  pre_deploy:
    - run: "pnpm test"
  post_deploy:
    - run: "echo 'Deployed $AGENT_NAME to $FORGE_ENV'"
